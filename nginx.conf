events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Hide nginx version
    server_tokens off;

    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=jenkins:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=archiva:10m rate=5r/s;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;

    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Upstreams
    upstream archiva_backend {
        server archiva:8080;
    }

    upstream jenkins_backend {
        server jenkins:8080;
    }

    #################################################
    # HTTP -> HTTPS REDIRECT
    #################################################

    server {
        listen 80;
        server_name archiva.noortakafulonline.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80;
        server_name jenkins.noortakafulonline.com;
        return 301 https://$host$request_uri;
    }

    #################################################
    # ARCHIVA
    #################################################

    server {
        listen 443 ssl http2;
        server_name archiva.noortakafulonline.com;

        ssl_certificate /etc/letsencrypt/live/archiva.noortakafulonline.com/cert.pem;
        ssl_certificate_key /etc/letsencrypt/live/archiva.noortakafulonline.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        location / {
            limit_req zone=archiva burst=10 nodelay;

            proxy_pass http://archiva_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_request_buffering off;
            chunked_transfer_encoding on;

            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }

    #################################################
    # JENKINS
    #################################################

    server {
        listen 443 ssl http2;
        server_name jenkins.noortakafulonline.com;

        ssl_certificate /etc/letsencrypt/live/archiva.noortakafulonline.com/cert.pem;
        ssl_certificate_key /etc/letsencrypt/live/archiva.noortakafulonline.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        location / {
            limit_req zone=jenkins burst=20 nodelay;

            proxy_pass http://jenkins_backend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;
            proxy_cache off;

            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
        }
    }
}