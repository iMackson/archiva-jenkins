services:
  archiva:
    image: xetusoss/archiva:2.2.10
    container_name: archiva
    restart: unless-stopped
    user: "1000:1000"  # Use unprivileged user for security
    environment:
      - JAVA_OPTS=-Xms512m -Xmx1024m
      - TZ=UTC
      # SMTP configuration for email notifications
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SSL=${SMTP_SSL}
      - SMTP_TLS=${SMTP_TLS}
      # Uncomment and set if authentication is required
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
    volumes:
      - archiva-data:/archiva-data
      - archiva-logs:/archiva-logs
      - archiva-conf:/archiva-conf
    cpus: 0.75
    mem_limit: 1536m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  jenkins:
    image: jenkins/jenkins:2.516.1-lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    user: "1000:1000"
    # Remove port 50000 if not using external Jenkins agents
    # ports:
    #   - "50000:50000"  # For Jenkins agents
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx2g -Xms1g
      - JENKINS_OPTS=--prefix=/jenkins
      - TZ=UTC
    cpus: 1.0
    mem_limit: 2048m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy-net
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run

  nginx:
    image: nginx:1.28-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment for HTTPS
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/archiva.noortakafulonline.com:/etc/letsencrypt/live/archiva.noortakafulonline.com:ro
      - nginx_logs:/var/log/nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy-net
    depends_on:
      archiva:
        condition: service_healthy
      jenkins:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx

volumes:
  archiva-data:
    driver: local
  archiva-logs:
    driver: local
  archiva-conf:
    driver: local
  jenkins_home:
    driver: local
  nginx_logs:
    driver: local

networks:
  proxy-net:
    driver: bridge