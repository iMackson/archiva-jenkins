services:
  archiva:
    image: xetusoss/archiva:v2.2.10
    container_name: archiva
    restart: unless-stopped
    user: "1000:1000"

    environment:
      - JAVA_OPTS=-Xms512m -Xmx1024m
      - TZ=UTC
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SSL=${SMTP_SSL}
      - SMTP_TLS=${SMTP_TLS}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}

    volumes:
      - archiva-data:/archiva-data
      - archiva-logs:/archiva-logs
      - archiva-conf:/archiva-conf

    expose:
      - "8080"

    cpus: 0.75
    mem_limit: 1536m

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - proxy-net

    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /tmp

