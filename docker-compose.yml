  jenkins:
    image: jenkins/jenkins:2.516.1-lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    user: "1000:1000"

    expose:
      - "8080"

    volumes:
      - jenkins_home:/var/jenkins_home

    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx1536m -Xms512m
      # - JENKINS_OPTS=--prefix=/jenkins
      - JENKINS_OPTS=--prefix=/
      - TZ=UTC

    mem_limit: 2048m

    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

    security_opt:
      - no-new-privileges:true

    networks:
      - proxy-net
  nginx:
    image: nginx:1.28-alpine
    container_name: nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    depends_on:
      archiva:
        condition: service_healthy
      jenkins:
        condition: service_healthy

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - proxy-net

    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run

volumes:
  archiva-data:
    driver: local

  archiva-logs:
    driver: local

  archiva-conf:
    driver: local

  jenkins_home:
    driver: local

  nginx_logs:
    driver: local

networks:
  proxy-net:
    driver: bridge